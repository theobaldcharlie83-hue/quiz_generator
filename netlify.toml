[build]
  command = "pip install -r requirements.txt"
  functions = "netlify/functions"
  publish = "."

[functions]
  included_files = [
    "app.py",
    "ai_engine.py",
    "storage.py"
  ]

# Pas de redirection globale /* pour éviter les 404 sur les fichiers statiques.
# Netlify servira index.html et le dossier static/ tout seul.

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
