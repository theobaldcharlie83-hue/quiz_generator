[build]
  command = "pip install -r requirements.txt"
  functions = "functions"
  publish = "."

[functions]
  included_files = [
    "app.py",
    "ai_engine.py",
    "storage.py",
    "templates/**"
  ]

# Redirection de l'API vers la fonction
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
